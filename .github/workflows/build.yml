name: build
on: [push]
jobs:
  deps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: curl, iconv, json, mbstring
          coverage: none
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'yarn'
      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('yarn.lock') }}
      - name: Cache vendor
        uses: actions/cache@v5
        with:
          path: vendor
          key: vendor-${{ hashFiles('composer.lock') }}
      - name: Install node dependencies
        run: yarn install --frozen-lockfile
      - name: Install composer dependencies
        run: composer install --no-scripts --prefer-dist --no-progress
      - name: Create guzzle function stubs
        run: |
          mkdir -p vendor/guzzlehttp/guzzle/src
          echo '<?php' > vendor/guzzlehttp/guzzle/src/functions_include.php
          mkdir -p vendor/guzzlehttp/promises/src
          echo '<?php' > vendor/guzzlehttp/promises/src/functions_include.php

  lint:
    needs: deps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'yarn'
      - name: Restore node_modules
        uses: actions/cache/restore@v5
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('yarn.lock') }}
          fail-on-cache-miss: true
      - run: yarn lint

  test:
    needs: deps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: curl, iconv, json, mbstring
          coverage: none
      - name: Restore vendor
        uses: actions/cache/restore@v5
        with:
          path: vendor
          key: vendor-${{ hashFiles('composer.lock') }}
          fail-on-cache-miss: true
      - name: Run unit tests
        run: vendor/bin/phpunit

  build:
    needs: deps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'yarn'
      - name: Restore node_modules
        uses: actions/cache/restore@v5
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('yarn.lock') }}
          fail-on-cache-miss: true
      - run: yarn build
      - uses: actions/upload-artifact@v7
        with:
          path: |
            build/simple-calendar-*.zip
            build/google-calendar-events/readme.txt
